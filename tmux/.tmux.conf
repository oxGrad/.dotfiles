# remap prefix from 'C-b' to 'C-a'
unbind C-b
set -g prefix C-a
bind C-a send-prefix

setw -g mouse on
setw -g mode-keys vi

set -sg escape-time 10
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Cross-platform clipboard support
# Try Kitty first, fallback to Wayland, then xsel
if-shell 'test -n "$KITTY_WINDOW_ID"' \
   'bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "kitty +kitten clipboard"' \
   'if-shell "command -v wl-copy > /dev/null 2>&1" \
       "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel \"wl-copy\"" \
       "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel \"xsel -ib\""'

# Additional copy mode improvements — mirror same Kitty check as 'y'
if-shell 'test -n "$KITTY_WINDOW_ID"' \
   'bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "kitty +kitten clipboard"; bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "kitty +kitten clipboard"' \
   'if-shell "command -v wl-copy > /dev/null 2>&1" \
       "bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel \"wl-copy\"; bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel \"wl-copy\"" \
       "bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel \"xsel -ib\"; bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel \"xsel -ib\""'
# status bar
set -g status-position top

# start with window 1 (instead of 0)
set -g base-index 1

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# List of plugins
# set -g @plugin 'fabioluciano/tmux-tokyo-night'
set -g @plugin 'maxpetretta/tmux-monokai-pro'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# tmux-resurrect configuration
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-save-bash-history 'on'
set -g @resurrect-dir '~/.tmux/resurrect'
set -g @resurrect-processes 'ssh psql sqlite3 mysql'     # Restore these processes
set -g @resurrect-strategy-vim 'session'              # Restore vim sessions
set -g @resurrect-strategy-nvim 'session'             # Restore nvim sessions

# tmux-continuum configuration
# Monokai theme configuration
set -g @monokai-plugins "cpu-usage ram-usage"
set -g @monokai-show-left-icon session
set -g @monokai-show-powerline true
# set -g @powerkit_theme "monokai"                       # Use Monokai theme
# set -g @powerkit_theme_variant "dark"                 # Dark variant
# set -g @tokyo-night-tmux_show_status_icons 1          # Show status icons
# set -g @tokyo-night-tmux_git_status_icon 1            # Enable git status icon
# set -g @tokyo-night-tmux_time_format '%H:%M'          # 24-hour time format
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'
set -g @continuum-status-interval '60'
set -g @continuum-save-at-shutdown 'on'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

